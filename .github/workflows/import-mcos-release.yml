name: Import McOS release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  import:
    if: github.event.comment.user.login == github.repository_owner && startsWith(github.event.comment.body, 'MCOS_FINALIZE')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct, verify, and extract release archive
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import pathlib
          import re
          import tarfile
          import urllib.request

          repository = os.environ["REPOSITORY"]
          issue = os.environ["ISSUE_NUMBER"]
          token = os.environ["GH_TOKEN"]
          pattern = re.compile(
              r"^MCOS_ARCHIVE_CHUNK index=(\d+) total=(\d+) sha256=([0-9a-f]{64})\n([A-Za-z0-9+/=]+)$"
          )

          comments = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repository}/issues/{issue}/comments?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  batch = json.load(response)
              comments.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          parts = {}
          expected_total = None
          expected_digest = None
          for comment in comments:
              match = pattern.match(comment.get("body", ""))
              if not match:
                  continue
              index, total, digest, payload = match.groups()
              index, total = int(index), int(total)
              if index < 1 or total < 1 or index > total:
                  raise SystemExit("Invalid archive chunk numbering")
              if expected_total is None:
                  expected_total, expected_digest = total, digest
              if (total, digest) != (expected_total, expected_digest):
                  raise SystemExit("Conflicting archive metadata")
              parts[index] = payload

          if expected_total is None or set(parts) != set(range(1, expected_total + 1)):
              raise SystemExit("Missing release archive chunks")

          encoded = "".join(parts[index] for index in range(1, expected_total + 1))
          archive_data = base64.b64decode(encoded, validate=True)
          actual_digest = hashlib.sha256(archive_data).hexdigest()
          if actual_digest != expected_digest:
              raise SystemExit("Release archive SHA-256 mismatch")

          archive = pathlib.Path("/tmp/mcos-release.tar.gz")
          archive.write_bytes(archive_data)
          with tarfile.open(archive, "r:gz") as bundle:
              for member in bundle.getmembers():
                  path = pathlib.PurePosixPath(member.name)
                  if path.is_absolute() or ".." in path.parts or member.issym() or member.islnk():
                      raise SystemExit(f"Unsafe archive entry: {member.name}")
              bundle.extractall(".")

          main = pathlib.Path("mcos/system/main.lua").read_text(encoding="utf-8")
          installer = pathlib.Path("installer.lua").read_text(encoding="utf-8")
          if 'local OS_VERSION = "1.0.0"' not in main:
              raise SystemExit("Core version is not 1.0.0")
          if 'local VERSION = "1.0.0"' not in installer:
              raise SystemExit("Installer version is not 1.0.0")
          PY

      - name: Commit imported release and remove importer
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          rm -f .github/workflows/import-mcos-release.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish McOS 1.0.0"
          git push
          gh issue close "$ISSUE_NUMBER" --repo "$REPOSITORY" --comment "McOS 1.0.0 was imported, verified, and committed successfully."
