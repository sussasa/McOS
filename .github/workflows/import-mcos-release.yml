name: Import McOS release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  import:
    if: github.event.comment.user.login == github.repository_owner && startsWith(github.event.comment.body, 'MCOS_FINALIZE')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct and verify release files
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import pathlib
          import re
          import urllib.request

          repository = os.environ["REPOSITORY"]
          issue = os.environ["ISSUE_NUMBER"]
          token = os.environ["GH_TOKEN"]
          allowed = {"installer.lua", "mcos/system/main.lua"}
          pattern = re.compile(
              r"^MCOS_CHUNK path=(\S+) index=(\d+) total=(\d+) sha256=([0-9a-f]{64})\n([A-Za-z0-9+/=]+)$"
          )

          comments = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repository}/issues/{issue}/comments?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  batch = json.load(response)
              comments.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          chunks = {}
          metadata = {}
          for comment in comments:
              match = pattern.match(comment.get("body", ""))
              if not match:
                  continue
              path, index, total, digest, payload = match.groups()
              if path not in allowed:
                  raise SystemExit(f"Unexpected target path: {path}")
              index, total = int(index), int(total)
              if index < 1 or total < 1 or index > total:
                  raise SystemExit(f"Invalid chunk numbering for {path}")
              chunks.setdefault(path, {})[index] = payload
              current = metadata.setdefault(path, (total, digest))
              if current != (total, digest):
                  raise SystemExit(f"Conflicting metadata for {path}")

          if set(chunks) != allowed:
              raise SystemExit(f"Missing release files: {sorted(allowed - set(chunks))}")

          for path in sorted(allowed):
              total, expected_digest = metadata[path]
              parts = chunks[path]
              if set(parts) != set(range(1, total + 1)):
                  raise SystemExit(f"Missing chunks for {path}")
              encoded = "".join(parts[index] for index in range(1, total + 1))
              data = base64.b64decode(encoded, validate=True)
              actual_digest = hashlib.sha256(data).hexdigest()
              if actual_digest != expected_digest:
                  raise SystemExit(f"SHA-256 mismatch for {path}")
              target = pathlib.Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(data)

          main = pathlib.Path("mcos/system/main.lua").read_text(encoding="utf-8")
          installer = pathlib.Path("installer.lua").read_text(encoding="utf-8")
          if 'local OS_VERSION = "1.0.0"' not in main:
              raise SystemExit("Core version is not 1.0.0")
          if 'local VERSION = "1.0.0"' not in installer:
              raise SystemExit("Installer version is not 1.0.0")
          PY

      - name: Commit imported files and remove importer
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          rm -f .github/workflows/import-mcos-release.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add installer.lua mcos/system/main.lua .github/workflows/import-mcos-release.yml
          git commit -m "Add McOS 1.0 core and installer"
          git push
          gh issue close "$ISSUE_NUMBER" --repo "$REPOSITORY" --comment "McOS 1.0 core and installer imported successfully."
