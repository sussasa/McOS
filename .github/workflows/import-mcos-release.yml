name: Import McOS release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  import:
    if: github.event.comment.user.login == github.repository_owner && startsWith(github.event.comment.body, 'MCOS_FINALIZE')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct and verify release sources
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import re
          import urllib.request

          repository = os.environ["REPOSITORY"]
          issue = os.environ["ISSUE_NUMBER"]
          token = os.environ["GH_TOKEN"]
          header_pattern = re.compile(
              r"^MCOS_SOURCE_CHUNK path=installer\.lua index=(\d+) total=(\d+) sha256=([0-9a-f]{64})$"
          )
          sentinel = "\nMCOS_SOURCE_END"

          comments = []
          page = 1
          while True:
              url = f"https://api.github.com/repos/{repository}/issues/{issue}/comments?per_page=100&page={page}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  batch = json.load(response)
              comments.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          chunks = {}
          expected_total = None
          expected_digest = None
          for comment in comments:
              body = comment.get("body", "")
              header, separator, payload = body.partition("\n")
              if not separator:
                  continue
              match = header_pattern.match(header)
              if not match:
                  continue
              if not payload.endswith(sentinel):
                  raise SystemExit("Source chunk is missing its end sentinel")
              payload = payload[:-len(sentinel)]
              index, total, digest = match.groups()
              index, total = int(index), int(total)
              if index < 1 or total < 1 or index > total:
                  raise SystemExit("Invalid installer chunk numbering")
              if expected_total is None:
                  expected_total, expected_digest = total, digest
              if (total, digest) != (expected_total, expected_digest):
                  raise SystemExit("Conflicting installer metadata")
              chunks[index] = payload

          if expected_total is None or set(chunks) != set(range(1, expected_total + 1)):
              raise SystemExit("Missing installer source chunks")

          uploaded_text = "".join(chunks[index] for index in range(1, expected_total + 1))
          uploaded_data = uploaded_text.encode("utf-8")
          actual_digest = hashlib.sha256(uploaded_data).hexdigest()
          if actual_digest != expected_digest:
              raise SystemExit(f"Uploaded installer SHA-256 mismatch: {actual_digest}")

          # The preview source still had two user-facing 'McOS 2' badges. Normalize
          # those labels only after verifying the uploaded source byte-for-byte.
          if uploaded_text.count('OS_NAME .. " 2"') != 2:
              raise SystemExit("Unexpected number of legacy display labels")
          installer_text = uploaded_text.replace('OS_NAME .. " 2"', 'OS_NAME .. " 1.0"')
          installer_data = installer_text.encode("utf-8")
          if hashlib.sha256(installer_data).hexdigest() != "56e588de3e5de4c3d5742df21d8b5f0532bf5413c71c80388568ba407c88039d":
              raise SystemExit("Normalized installer SHA-256 mismatch")

          main_match = re.search(
              r"\{ path = '/mcos/system/main\.lua', data = \[===\[(.*?)\]===\], optional = false \},",
              installer_text,
              re.DOTALL,
          )
          if not main_match:
              raise SystemExit("Unable to extract the embedded McOS core")
          main_text = main_match.group(1)

          pathlib.Path("installer.lua").write_bytes(installer_data)
          pathlib.Path("mcos/system").mkdir(parents=True, exist_ok=True)
          pathlib.Path("mcos/system/main.lua").write_text(main_text, encoding="utf-8")

          if 'local VERSION = "1.0.0"' not in installer_text:
              raise SystemExit("Installer version is not 1.0.0")
          if 'local OS_VERSION = "1.0.0"' not in main_text:
              raise SystemExit("Core version is not 1.0.0")
          if 'OS_NAME .. " 2"' in installer_text or 'OS_NAME .. " 2"' in main_text:
              raise SystemExit("A legacy McOS 2 display label remains")
          if hashlib.sha256(main_text.encode("utf-8")).hexdigest() != "46d39d046242c828466dd9eaa03e3e05f02fa161845b1c070ee3d51eecb63148":
              raise SystemExit("Normalized core SHA-256 mismatch")
          PY

      - name: Commit imported release and remove importer
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          rm -f .github/workflows/import-mcos-release.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish McOS 1.0.0"
          git push
          gh issue close "$ISSUE_NUMBER" --repo "$REPOSITORY" --comment "McOS 1.0.0 was imported, verified, and committed successfully."
